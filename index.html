<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 40%),
        linear-gradient(135deg, #141e30 0%, #243b55 100%);
      color: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .app {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      padding: 30px 28px;
      border-radius: 28px;
      width: min(420px, calc(100% - 40px));
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.8rem;
      letter-spacing: 0.04em;
    }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input {
      width: 100%;
      max-width: 230px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.35);
    }

    button {
      min-width: 120px;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: #56ccf2;
      color: #09203f;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #2f80ed;
    }

    .weather {
      margin-top: 24px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .weather h3 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }

    .temp {
      font-size: 3rem;
      margin: 8px 0;
      font-weight: 700;
    }

    .weather p {
      margin: 8px 0;
      opacity: 0.9;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 12px;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.75);
    }
  </style>
</head>
<body>

<div class="app">
  <h2>Weather App</h2>
  <div class="search-row">
    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Get Weather</button>
  </div>

  <div class="hint">Try city names like Hyderabad, Delhi, Mumbai or type abbreviations such as hyd.</div>
  <div class="weather" id="weatherResult"></div>
</div>

<script>
  const apiKey = "YOUR_API_KEY_HERE"; // Replace with your OpenWeatherMap API key

  const cityAliases = {
    hyd: "Hyderabad",
    del: "Delhi",
    mum: "Mumbai",
    blr: "Bangalore",
    beng: "Bengaluru",
    bom: "Mumbai"
  };

  function normalizeCityName(city) {
    const key = city.trim().toLowerCase();
    return cityAliases[key] || city.trim();
  }

  async function getWeather() {
    const cityInput = document.getElementById("city").value;
    const resultDiv = document.getElementById("weatherResult");

    if (!cityInput.trim()) {
      resultDiv.innerHTML = "Please enter a city name.";
      return;
    }

    const city = normalizeCityName(cityInput);

    try {
      const response = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`
      );

      if (!response.ok) {
        throw new Error("City not found. Try Hyderabad, Delhi, or another city.");
      }

      const data = await response.json();
      const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

      const weatherHTML = `
        <h3>${data.name}, ${data.sys.country}</h3>
        <img class="icon" src="${iconUrl}" alt="${data.weather[0].description}">
        <div class="temp">${Math.round(data.main.temp)}°C</div>
        <p>${data.weather[0].description}</p>
        <p>Humidity: ${data.main.humidity}%</p>
        <p>Wind: ${data.wind.speed} m/s</p>
      `;

      resultDiv.innerHTML = weatherHTML;

    } catch (error) {
      resultDiv.innerHTML = error.message;
    }
  }
</script>

</body>
</html>
